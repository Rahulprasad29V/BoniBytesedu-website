<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Admin Login | Boni Bytes Edutech Internship Dashboard</title>
  <meta name="description" content="Official Boni Bytes Edutech admin login for authorized administrators managing internship registrations, attendance, projects and certificates.">
  <meta name="robots" content="index, follow">
  <meta name="googlebot" content="index, follow">
  <link rel="canonical" href="https://www.bonibytesedutech.live/admin-login.html">
  <link rel="icon" href="logo.png" type="image/png">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Boni Bytes Edutech">
  <meta property="og:title" content="Admin Login | Boni Bytes Edutech">
  <meta property="og:description" content="Official administrator access to the Boni Bytes Edutech internship management dashboard.">
  <meta property="og:url" content="https://www.bonibytesedutech.live/admin-login.html">
  <meta property="og:image" content="https://www.bonibytesedutech.live/logo.png">

  <script type="application/ld+json">
  {
    "@context":"https://schema.org",
    "@type":"WebPage",
    "name":"Boni Bytes Edutech Admin Login",
    "url":"https://www.bonibytesedutech.live/admin-login.html",
    "description":"Official administrator login page for the Boni Bytes Edutech internship management dashboard.",
    "isPartOf":{
      "@type":"WebSite",
      "name":"Boni Bytes Edutech",
      "url":"https://www.bonibytesedutech.live/"
    }
  }
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-100 flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8">

    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-slate-900">
        Admin Login
      </h1>

      <p class="text-slate-500 mt-2">
        Boni Bytes Edutech Internship Dashboard
      </p>
    </div>

    <form id="loginForm" class="space-y-5">

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">
          Username
        </label>

        <input
          type="text"
          id="username"
          required
          autocomplete="username"
          class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Enter username"
        >
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">
          Password
        </label>

        <input
          type="password"
          id="password"
          required
          autocomplete="current-password"
          class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Enter password"
        >
      </div>

      <div
        id="errorMessage"
        class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm"
      >
        Incorrect username or password.
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition"
      >
        Login to Dashboard
      </button>

    </form>

    <div class="text-center mt-7 pt-6 border-t">
      <a href="index.html" class="text-sm font-semibold text-slate-500 hover:text-blue-600">
        ← Back to Boni Bytes Edutech
      </a>
    </div>

  </div>

  <script>
    const ADMIN_USERNAME = "admin";
    const ADMIN_PASSWORD = "admin123";

    document
      .getElementById("loginForm")
      .addEventListener("submit", function(event) {

        event.preventDefault();

        const username =
          document.getElementById("username").value;

        const password =
          document.getElementById("password").value;

        const errorMessage =
          document.getElementById("errorMessage");

        if (
          username === ADMIN_USERNAME &&
          password === ADMIN_PASSWORD
        ) {

          sessionStorage.setItem(
            "bbeAdminLoggedIn",
            "true"
          );

          window.location.href = "admin.html";

        } else {

          errorMessage.classList.remove("hidden");

        }

      });
  </script>

</body>
</html>
